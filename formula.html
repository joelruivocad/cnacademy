<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CNAcademy — Formula</title>
<link rel="stylesheet" href="css/style.css"/>
<style>
.formula-hero{
  background:linear-gradient(135deg,var(--purple-bg),var(--brand-light));
  border-radius:var(--r24);
  padding:40px 48px;
  margin-bottom:28px;
  position:relative;
  overflow:hidden;
}
.formula-hero::before{
  content:'📊';
  position:absolute;
  right:40px;top:50%;
  transform:translateY(-50%);
  font-size:80px;
  opacity:.12;
}
.formula-semana{
  font:700 11px var(--fm);
  color:var(--purple);
  text-transform:uppercase;
  letter-spacing:.6px;
  margin-bottom:8px;
}
.formula-nome{
  font-family:var(--fd);
  font-size:clamp(24px,4vw,36px);
  font-weight:700;
  color:var(--gs900);
  margin-bottom:6px;
}
.formula-nome span{
  background:linear-gradient(135deg,var(--purple),var(--brand));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
.formula-desc{
  font-size:14px;
  color:var(--gs500);
  line-height:1.65;
  max-width:560px;
}
.bloco{
  background:rgba(255,255,255,.88);
  border:1px solid rgba(255,255,255,.95);
  border-radius:var(--r20);
  padding:28px 32px;
  box-shadow:var(--sh-md);
  backdrop-filter:blur(10px);
  margin-bottom:20px;
}
.bloco-titulo{
  font-family:var(--fd);
  font-size:16px;
  font-weight:700;
  color:var(--gs900);
  margin-bottom:16px;
  display:flex;
  align-items:center;
  gap:10px;
}
/* Sintaxe */
.sintaxe-box{
  background:var(--gs900);
  border-radius:var(--r8);
  padding:16px 20px;
  font:400 14px var(--fm);
  color:#E0E0E0;
  margin-bottom:12px;
  overflow-x:auto;
  line-height:1.8;
}
.sintaxe-box .fn{color:#C792EA;}
.sintaxe-box .arg{color:#82AAFF;}
.sintaxe-box .op{color:#89DDFF;}
.sintaxe-box .str{color:#C3E88D;}
.sintaxe-box .num{color:#F78C6C;}
.sintaxe-box .comment{color:#546E7A;font-style:italic;}
/* Parametros */
.param-list{list-style:none;padding:0;}
.param-item{
  display:flex;
  align-items:flex-start;
  gap:12px;
  padding:10px 0;
  border-bottom:1px solid var(--gs100);
  font-size:13px;
}
.param-item:last-child{border-bottom:none;}
.param-nome{
  font:700 12px var(--fm);
  color:var(--purple);
  background:var(--purple-bg);
  border-radius:var(--r8);
  padding:2px 8px;
  white-space:nowrap;
  flex-shrink:0;
}
.param-desc{color:var(--gs500);line-height:1.55;}
/* Exemplos */
.exemplo-tab{
  display:flex;
  gap:4px;
  margin-bottom:16px;
  background:var(--gs50);
  border-radius:var(--r8);
  padding:4px;
}
.ex-tab-btn{
  padding:6px 14px;
  border-radius:var(--r8);
  font:600 12px var(--fp);
  cursor:pointer;
  border:none;
  background:transparent;
  color:var(--gs500);
  transition:all 150ms;
}
.ex-tab-btn.active{
  background:var(--white);
  color:var(--purple);
  box-shadow:var(--sh-sm);
}
.ex-content{display:none;}
.ex-content.active{display:block;}
/* Tabela de exemplo */
.sheets-table{
  width:100%;
  border-collapse:collapse;
  font:400 12px var(--fm);
  margin-bottom:12px;
}
.sheets-table th{
  background:var(--gs50);
  border:1px solid var(--gs200);
  padding:8px 12px;
  font-weight:700;
  color:var(--gs700);
  text-align:center;
  font-size:11px;
}
.sheets-table td{
  border:1px solid var(--gs200);
  padding:8px 12px;
  color:var(--gs700);
  text-align:center;
}
.sheets-table .col-a{background:#E8F0FE;font-weight:600;color:var(--blue);}
.sheets-table .formula-cell{
  background:#E6F4EA;
  color:var(--ok);
  font-weight:600;
}
.sheets-table .header-col{
  background:#F3E8FD;
  font-weight:700;
  color:var(--purple);
}
/* Resultado */
.resultado-box{
  background:var(--ok-bg);
  border:1px solid var(--ok);
  border-radius:var(--r8);
  padding:12px 16px;
  font-size:13px;
  color:var(--ok);
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:8px;
}
/* Erros comuns */
.erro-item{
  display:flex;
  align-items:flex-start;
  gap:12px;
  padding:12px 0;
  border-bottom:1px solid var(--gs100);
}
.erro-item:last-child{border-bottom:none;}
.erro-code{
  font:700 11px var(--fm);
  color:var(--err);
  background:var(--err-bg);
  border-radius:var(--r8);
  padding:3px 8px;
  white-space:nowrap;
  flex-shrink:0;
}
.erro-desc{font-size:13px;color:var(--gs500);line-height:1.55;}
/* Dica */
.dica-box{
  background:linear-gradient(135deg,var(--purple-bg),var(--brand-light));
  border-radius:var(--r8);
  padding:16px 20px;
  display:flex;
  gap:12px;
  align-items:flex-start;
}
.dica-icon{font-size:22px;flex-shrink:0;}
.dica-text{font-size:13px;color:var(--gs700);line-height:1.65;}
.dica-text strong{color:var(--purple);}
/* Nav lateral de formulas */
.formula-nav{
  background:rgba(255,255,255,.88);
  border:1px solid rgba(255,255,255,.95);
  border-radius:var(--r20);
  padding:20px;
  box-shadow:var(--sh-md);
  backdrop-filter:blur(10px);
  position:sticky;
  top:80px;
}
.formula-nav-title{
  font:700 12px var(--fd);
  color:var(--gs700);
  text-transform:uppercase;
  letter-spacing:.5px;
  margin-bottom:12px;
}
.formula-nav-item{
  display:flex;
  align-items:center;
  gap:8px;
  padding:8px 10px;
  border-radius:var(--r8);
  cursor:pointer;
  transition:all 150ms;
  text-decoration:none;
  margin-bottom:4px;
}
.formula-nav-item:hover{
  background:var(--purple-bg);
  color:var(--purple);
}
.formula-nav-item.active{
  background:var(--purple-bg);
  color:var(--purple);
  font-weight:600;
}
.formula-nav-semana{
  font:600 10px var(--fm);
  color:var(--gs400);
  width:22px;
  flex-shrink:0;
}
.formula-nav-nome{
  font-size:12px;
  color:var(--gs700);
  font-family:var(--fm);
}
.formula-nav-item.active .formula-nav-nome{color:var(--purple);}
/* Layout com nav lateral */
.formula-layout{
  display:grid;
  grid-template-columns:220px 1fr;
  gap:24px;
  align-items:start;
}
@media(max-width:900px){
  .formula-layout{grid-template-columns:1fr;}
  .formula-nav{position:static;}
}
</style>
</head>
<body>
<div class="clouds">
  <div class="cl cl1"></div><div class="cl cl2"></div>
  <div class="cl cl3"></div><div class="cl cl4"></div>
</div>
<svg class="stars-svg" id="stars"></svg>

<nav class="nav">
  <div class="nav-left">
    <span class="nav-icon">😇</span>
    <div>
      <div class="nav-title">CNAcademy</div>
      <div class="nav-sub" id="navSub">Trilha de Formulas</div>
    </div>
  </div>
  <div class="nav-right">
    <button class="btn btn-sec btn-sm" onclick="history.back()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Voltar
    </button>
    <button class="btn btn-err btn-sm" onclick="doLogout()">Sair</button>
  </div>
</nav>

<main class="main">

  <!-- Hero dinamico -->
  <div class="formula-hero" id="formulaHero">
    <div class="formula-semana" id="heroSemana">Semana 1</div>
    <div class="formula-nome" id="heroNome">
      <span>SOMASES</span>
    </div>
    <div class="formula-desc" id="heroDesc">
      Soma valores em um intervalo com base em multiplos criterios.
      Essencial para calcular investimento por plataforma e periodo.
    </div>
  </div>

  <div class="formula-layout">

    <!-- NAV LATERAL -->
    <div class="formula-nav">
      <div class="formula-nav-title">Trilha de Sheets</div>
      <div id="formulaNavList"></div>
    </div>

    <!-- CONTEUDO DA FORMULA -->
    <div id="formulaContent"></div>

  </div>
</main>

<script src="js/stars.js"></script>
<script type="module" src="js/auth.js"></script>
<script type="module">

// ── DADOS DAS FORMULAS ────────────────────
const FORMULAS = {
  'S1': {
    semana: 'Semana 1',
    nome: 'SOMASES',
    desc: 'Soma valores em um intervalo com base em multiplos criterios. Essencial para calcular investimento por plataforma e periodo.',
    sintaxe: `<span class="fn">=SOMASES</span>(<span class="arg">intervalo_soma</span>; <span class="arg">intervalo_criterio1</span>; <span class="arg">criterio1</span>; <span class="arg">intervalo_criterio2</span>; <span class="arg">criterio2</span>)`,
    parametros: [
      { nome: 'intervalo_soma', desc: 'O intervalo de celulas que voce quer somar. Ex: a coluna de Investimento.' },
      { nome: 'intervalo_criterio1', desc: 'O intervalo onde a primeira condicao sera verificada. Ex: a coluna de Plataforma.' },
      { nome: 'criterio1', desc: 'A condicao a ser atendida no primeiro intervalo. Ex: "Google".' },
      { nome: 'intervalo_criterio2', desc: 'Intervalo da segunda condicao. Ex: a coluna de Mes.' },
      { nome: 'criterio2', desc: 'Segunda condicao. Ex: "Abril".' },
    ],
    exemploBasico: {
      descricao: 'Soma todos os valores da coluna B onde a coluna A for igual a "Google":',
      formula: '=SOMASES(B2:B100; A2:A100; "Google")',
      tabela: `<table class="sheets-table">
        <tr><th>A — Plataforma</th><th>B — Investimento</th></tr>
        <tr><td>Google</td><td>R$ 4.500</td></tr>
        <tr><td>Meta</td><td>R$ 3.200</td></tr>
        <tr><td>Google</td><td>R$ 2.800</td></tr>
        <tr><td>TikTok</td><td>R$ 1.100</td></tr>
        <tr><td class="formula-cell" colspan="2">=SOMASES(B2:B5; A2:A5; "Google")</td></tr>
      </table>`,
      resultado: 'R$ 7.300 — soma apenas os valores onde a plataforma e "Google"'
    },
    exemploCNA: {
      descricao: 'No CNA, use SOMASES para somar o investimento total em Google no mes de Abril:',
      formula: '=SOMASES(D2:D100; B2:B100; "Google"; C2:C100; "Abril")',
      tabela: `<table class="sheets-table">
        <tr><th>B — Plataforma</th><th>C — Mes</th><th>D — Investimento</th></tr>
        <tr><td>Google</td><td>Abril</td><td>R$ 4.500</td></tr>
        <tr><td>Meta</td><td>Abril</td><td>R$ 3.200</td></tr>
        <tr><td>Google</td><td>Maio</td><td>R$ 4.800</td></tr>
        <tr><td>Google</td><td>Abril</td><td>R$ 2.800</td></tr>
        <tr><td class="formula-cell" colspan="3">=SOMASES(D2:D4; B2:B4; "Google"; C2:C4; "Abril")</td></tr>
      </table>`,
      resultado: 'R$ 7.300 — soma apenas Google em Abril, ignorando outros meses e plataformas'
    },
    erros: [
      { code: '#VALOR!', desc: 'Os intervalos tem tamanhos diferentes. Certifique-se que intervalo_soma e intervalo_criterio tem o mesmo numero de linhas.' },
      { code: 'Resultado 0', desc: 'O criterio nao foi encontrado. Verifique se ha espacos ou letras maiusculas/minusculas diferentes entre o criterio e os dados.' },
    ],
    dica: 'Use <strong>&</strong> para criar criterios dinamicos referenciando celulas. Ex: ao inves de "Google", use <strong>A1</strong> — assim voce muda o filtro so alterando a celula A1, sem editar a formula.'
  },

  'S2': {
    semana: 'Semana 2',
    nome: 'Variacao % + Formatacao Condicional',
    desc: 'Calcula a variacao percentual entre dois periodos e usa formatacao condicional para destacar automaticamente valores criticos.',
    sintaxe: `<span class="comment">// Variacao percentual</span>\n<span class="fn">=</span>(<span class="arg">valor_novo</span> <span class="op">-</span> <span class="arg">valor_antigo</span>) <span class="op">/</span> <span class="arg">valor_antigo</span>`,
    parametros: [
      { nome: 'valor_novo', desc: 'O valor do periodo mais recente. Ex: CPL desta semana.' },
      { nome: 'valor_antigo', desc: 'O valor do periodo anterior. Ex: CPL da semana passada.' },
    ],
    exemploBasico: {
      descricao: 'Calcula a variacao do CPL entre duas semanas:',
      formula: '=(B2-A2)/A2',
      tabela: `<table class="sheets-table">
        <tr><th>A — CPL Semana 1</th><th>B — CPL Semana 2</th><th>C — Variacao</th></tr>
        <tr><td>R$ 40</td><td>R$ 52</td><td class="formula-cell">=(B2-A2)/A2</td></tr>
      </table>`,
      resultado: '30% — o CPL subiu 30% de uma semana para outra'
    },
    exemploCNA: {
      descricao: 'Compare o CPL do Inglês entre duas semanas e destaque automaticamente se subiu mais de 20%:',
      formula: '=(D3-C3)/C3',
      tabela: `<table class="sheets-table">
        <tr><th>B — Campanha</th><th>C — CPL S1</th><th>D — CPL S2</th><th>E — Variacao</th></tr>
        <tr><td>Ingles Search</td><td>R$ 38</td><td>R$ 46</td><td class="formula-cell">=(D2-C2)/C2</td></tr>
        <tr><td>Kids Social</td><td>R$ 55</td><td>R$ 50</td><td class="formula-cell">=(D3-C3)/C3</td></tr>
      </table>`,
      resultado: '+21% no Ingles (critico) e -9% no Kids (melhora). Formatacao condicional destaca o Ingles em vermelho automaticamente.'
    },
    erros: [
      { code: '#DIV/0!', desc: 'O valor antigo e zero. Use SEERRO para tratar: =SEERRO((B2-A2)/A2; 0)' },
      { code: 'Resultado estranho', desc: 'Certifique-se de formatar a celula como Porcentagem (%) para exibir corretamente.' },
    ],
    dica: 'Para aplicar Formatacao Condicional: selecione a coluna de variacao → Formatar → Formatacao condicional → "Maior que 0,2" → cor vermelha. Assim qualquer variacao acima de <strong>20% fica vermelha automaticamente</strong>.'
  },

  'S3': {
    semana: 'Semana 3',
    nome: 'CONT.SES',
    desc: 'Conta o numero de celulas que atendem a multiplos criterios. Util para contar campanhas por status, plataforma ou faixa de CPL.',
    sintaxe: `<span class="fn">=CONT.SES</span>(<span class="arg">intervalo1</span>; <span class="arg">criterio1</span>; <span class="arg">intervalo2</span>; <span class="arg">criterio2</span>)`,
    parametros: [
      { nome: 'intervalo1', desc: 'Primeiro intervalo de celulas a verificar.' },
      { nome: 'criterio1', desc: 'Condicao a verificar no primeiro intervalo.' },
      { nome: 'intervalo2', desc: 'Segundo intervalo (opcional).' },
      { nome: 'criterio2', desc: 'Segunda condicao (opcional).' },
    ],
    exemploBasico: {
      descricao: 'Conta quantas campanhas sao do Google:',
      formula: '=CONT.SES(A2:A100; "Google")',
      tabela: `<table class="sheets-table">
        <tr><th>A — Plataforma</th><th>B — Status</th></tr>
        <tr><td>Google</td><td>Ativa</td></tr>
        <tr><td>Meta</td><td>Ativa</td></tr>
        <tr><td>Google</td><td>Pausada</td></tr>
        <tr><td>Google</td><td>Ativa</td></tr>
        <tr><td class="formula-cell" colspan="2">=CONT.SES(A2:A5; "Google")</td></tr>
      </table>`,
      resultado: '3 — ha 3 campanhas do Google'
    },
    exemploCNA: {
      descricao: 'Conta quantas campanhas do Google estao com pacing abaixo de 50% no meio do mes:',
      formula: '=CONT.SES(B2:B20; "Google"; D2:D20; "<50%")',
      tabela: `<table class="sheets-table">
        <tr><th>B — Plataforma</th><th>C — Campanha</th><th>D — Pacing</th></tr>
        <tr><td>Google</td><td>Ingles Search</td><td>42%</td></tr>
        <tr><td>Google</td><td>Institucional</td><td>65%</td></tr>
        <tr><td>Meta</td><td>Ingles Social</td><td>38%</td></tr>
        <tr><td>Google</td><td>Kids Search</td><td>45%</td></tr>
        <tr><td class="formula-cell" colspan="3">=CONT.SES(B2:B5;"Google";D2:D5;"<0,5")</td></tr>
      </table>`,
      resultado: '2 — duas campanhas do Google com pacing abaixo de 50%'
    },
    erros: [
      { code: 'Resultado 0', desc: 'O criterio nao esta sendo encontrado. Verifique espacos extras e a formatacao dos dados.' },
      { code: '#VALOR!', desc: 'Os intervalos tem tamanhos diferentes. Todos os intervalos precisam ter o mesmo numero de linhas.' },
    ],
    dica: 'Use <strong>"<"</strong>, <strong>">"</strong>, <strong>"<="</strong> e <strong>">="</strong> para criar criterios numericos. Ex: <strong>"<0,5"</strong> para valores menores que 50% ou <strong>">="&B1</strong> para referenciar uma celula.'
  },

  'S4': {
    semana: 'Semana 4',
    nome: 'SE + E + OU',
    desc: 'Combinacao de funcoes logicas para criar classificacoes automaticas baseadas em multiplas condicoes.',
    sintaxe: `<span class="fn">=SE</span>(<span class="arg">condicao</span>; <span class="str">"valor_se_verdadeiro"</span>; <span class="str">"valor_se_falso"</span>)\n\n<span class="fn">=SE</span>(<span class="fn">E</span>(<span class="arg">cond1</span>; <span class="arg">cond2</span>); <span class="str">"ambas verdadeiras"</span>; <span class="str">"alguma falsa"</span>)\n\n<span class="fn">=SE</span>(<span class="fn">OU</span>(<span class="arg">cond1</span>; <span class="arg">cond2</span>); <span class="str">"alguma verdadeira"</span>; <span class="str">"todas falsas"</span>)`,
    parametros: [
      { nome: 'SE', desc: 'Testa uma condicao e retorna um valor se verdadeira e outro se falsa.' },
      { nome: 'E', desc: 'Retorna VERDADEIRO somente se TODAS as condicoes forem verdadeiras.' },
      { nome: 'OU', desc: 'Retorna VERDADEIRO se PELO MENOS UMA das condicoes for verdadeira.' },
    ],
    exemploBasico: {
      descricao: 'Classifica uma campanha como "Eficiente", "Atencao" ou "Critico" com base no CPL:',
      formula: '=SE(A2<30;"Eficiente";SE(A2<=50;"Atencao";"Critico"))',
      tabela: `<table class="sheets-table">
        <tr><th>A — CPL</th><th>B — Classificacao</th></tr>
        <tr><td>R$ 25</td><td class="formula-cell">=SE(A2&lt;30;"Eficiente";SE(A2&lt;=50;"Atencao";"Critico"))</td></tr>
        <tr><td>R$ 42</td><td class="formula-cell">=SE(A3&lt;30;"Eficiente";SE(A3&lt;=50;"Atencao";"Critico"))</td></tr>
        <tr><td>R$ 65</td><td class="formula-cell">=SE(A4&lt;30;"Eficiente";SE(A4&lt;=50;"Atencao";"Critico"))</td></tr>
      </table>`,
      resultado: '"Eficiente" / "Atencao" / "Critico" — classificacao automatica por faixa de CPL'
    },
    exemploCNA: {
      descricao: 'Classifica o pacing de cada campanha do CNA como saudavel, atencao ou critico:',
      formula: '=SE(E(B2>="45%";B2<="55%");"Saudavel";SE(OU(B2<"30%";B2>"80%");"Critico";"Atencao"))',
      tabela: `<table class="sheets-table">
        <tr><th>A — Campanha</th><th>B — Pacing</th><th>C — Status Pacing</th></tr>
        <tr><td>Ingles Search</td><td>50%</td><td class="formula-cell">Saudavel</td></tr>
        <tr><td>Kids Social</td><td>28%</td><td class="formula-cell">Critico</td></tr>
        <tr><td>Institucional</td><td>62%</td><td class="formula-cell">Atencao</td></tr>
      </table>`,
      resultado: 'Cada campanha recebe uma classificacao automatica de pacing sem precisar analisar manualmente'
    },
    erros: [
      { code: '#NOME?', desc: 'Funcao escrita errada. Verifique se e SE, E e OU (em portugues no Sheets).' },
      { code: 'Resultado inesperado', desc: 'Verifique a ordem das condicoes — o SE testa da primeira para a ultima. A ordem importa.' },
    ],
    dica: 'Voce pode aninhar ate <strong>64 funcoes SE</strong>, mas mais de 3 fica dificil de ler. Para classificacoes complexas, prefira a funcao <strong>SES</strong> que testa multiplas condicoes de forma mais limpa.'
  },

  'S5': {
    semana: 'Semana 5',
    nome: 'PROCV / PROCX',
    desc: 'Busca um valor em uma tabela e retorna um valor correspondente de outra coluna. PROCX e a versao moderna e mais flexivel do PROCV.',
    sintaxe: `<span class="comment">// PROCV (classico)</span>\n<span class="fn">=PROCV</span>(<span class="arg">valor_procurado</span>; <span class="arg">intervalo_tabela</span>; <span class="num">numero_coluna</span>; <span class="num">0</span>)\n\n<span class="comment">// PROCX (moderno — recomendado)</span>\n<span class="fn">=PROCX</span>(<span class="arg">valor_procurado</span>; <span class="arg">intervalo_busca</span>; <span class="arg">intervalo_retorno</span>; <span class="str">"nao encontrado"</span>)`,
    parametros: [

    sintaxe: `<span class="comment">// Nao ha formula nova na Semana 12</span>\n<span class="comment">// O foco e aplicar tudo aprendido em uma apresentacao real</span>\n\n<span class="comment">// Checklist de formulas usadas na apresentacao:</span>\n<span class="fn">SOMASES</span>   <span class="comment">→ totais por periodo/plataforma</span>\n<span class="fn">QUERY</span>     <span class="comment">→ consolidacao por canal</span>\n<span class="fn">PROCX</span>     <span class="comment">→ comparacao com metas</span>\n<span class="fn">Variacao%</span> <span class="comment">→ evolucao vs periodo anterior</span>\n<span class="fn">SEERRO</span>    <span class="comment">→ dados sempre limpos</span>`,
    parametros: [

      { nome: 'Slide 2 — Destaques', desc: 'Use QUERY para identificar as campanhas que mais performaram.' },
      { nome: 'Slide 3 — Atencao', desc: 'Use variacao % e formatacao condicional para evidenciar o que regrediu.' },

      tabela: `<table class="sheets-table">
        <tr><th>Slide</th><th>Metrica</th><th>Formula no Sheets</th></tr>
        <tr><td>1</td><td>Investimento total</td><td>=SOMASES(D:D;C:C;"Abril")</td></tr>
        <tr><td>1</td><td>Total de leads</td><td>=SOMASES(E:E;C:C;"Abril")</td></tr>
        <tr><td>1</td><td>CPL medio</td><td>=Investimento/Leads</td></tr>
        <tr><td>2</td><td>Melhor campanha</td><td>=QUERY(...;"ORDER BY CPL ASC LIMIT 1")</td></tr>
        <tr><td>3</td><td>Variacao vs mes ant.</td><td>=(CPL_Atual-CPL_Ant)/CPL_Ant</td></tr>

      resultado: 'Todos os numeros prontos para copiar para o Google Slides — sem calculo manual'

    exemploCNA: {
      descricao: 'Preparacao dos dados para a apresentacao mensal do CNA:',
      formula: 'Dashboard → copia os numeros → cola no Slides como valores',
      tabela: `<table class="sheets-table">
        <tr><th>O que apresentar</th><th>De onde tirar</th></tr>
        <tr><td>Resultado do mes</td><td>Aba de dashboard — secao de totais</td></tr>
        <tr><td>CPL por plataforma</td><td>QUERY com GROUP BY plataforma</td></tr>
        <tr><td>Variacao vs mes anterior</td><td>Coluna de variacao % formatada</td></tr>
        <tr><td>Grafico de tendencia</td><td>Grafico de linha do dashboard</td></tr>

      </table>`,
      resultado: 'Apresentacao pronta em minutos — os dados ja estao calculados no dashboard'
    },
    erros: [
      { code: 'Numero errado no slide', desc: 'Sempre cole como "Colar somente valores" (Ctrl+Shift+V) no Slides — nunca cole com formulas, pois elas nao funcionam fora do Sheets.' },
    ],
    dica: 'O Sheets e a sua fonte da verdade. O Slides e apenas a vitrine. <strong>Nunca calcule nada no Slides</strong> — calcule no Sheets, extraia o numero e apresente. Assim voce garante que os numeros estao corretos e rastreados.'
  }
};

// ── RENDER ────────────────────────────────
const params  = new URLSearchParams(window.location.search);
let   current = params.get('s') || 'S1';

function renderNav() {
  const list = document.getElementById('formulaNavList');
  list.innerHTML = '';
  Object.entries(FORMULAS).forEach(([key, f]) => {
    const a = document.createElement('a');
    a.className = 'formula-nav-item' + (key === current ? ' active' : '');
    a.href = `formula.html?s=${key}`;
    a.innerHTML = `
      <span class="formula-nav-semana">${key}</span>
      <span class="formula-nav-nome">${f.nome}</span>`;
    list.appendChild(a);
  });
}

function renderHero(f) {
  document.getElementById('heroSemana').textContent = f.semana;
  document.getElementById('heroNome').innerHTML     = `<span>${f.nome}</span>`;
  document.getElementById('heroDesc').textContent   = f.desc;
  document.title = `CNAcademy — ${f.nome}`;
  document.getElementById('navSub').textContent     = f.semana;
}

function renderContent(f) {
  const c = document.getElementById('formulaContent');
  c.innerHTML = `

    <!-- Sintaxe -->
    <div class="bloco">
      <div class="bloco-titulo">📝 Sintaxe</div>
      <div class="sintaxe-box">${f.sintaxe}</div>
      <ul class="param-list">
        ${f.parametros.map(p => `
          <li class="param-item">
            <span class="param-nome">${p.nome}</span>
            <span class="param-desc">${p.desc}</span>
          </li>`).join('')}
      </ul>
    </div>

    <!-- Exemplos -->
    <div class="bloco">
      <div class="bloco-titulo">💡 Exemplos</div>
      <div class="exemplo-tab">
        <button class="ex-tab-btn active"
          onclick="switchTab('basico', this)">
          Exemplo basico
        </button>
        <button class="ex-tab-btn"
          onclick="switchTab('cna', this)">
          Aplicado ao CNA
        </button>
      </div>

      <!-- Basico -->
      <div class="ex-content active" id="ex-basico">
        <p style="font-size:13px;color:var(--gs500);
          margin-bottom:12px;line-height:1.6;">
          ${f.exemploBasico.descricao}
        </p>
        <div class="sintaxe-box" style="font-size:13px;">
          ${f.exemploBasico.formula}
        </div>
        ${f.exemploBasico.tabela}
        <div class="resultado-box">
          <span style="font-size:18px;">✅</span>
          <span><strong>Resultado:</strong> ${f.exemploBasico.resultado}</span>
        </div>
      </div>

      <!-- CNA -->
      <div class="ex-content" id="ex-cna">
        <p style="font-size:13px;color:var(--gs500);
          margin-bottom:12px;line-height:1.6;">
          ${f.exemploCNA.descricao}
        </p>
        <div class="sintaxe-box" style="font-size:13px;">
          ${f.exemploCNA.formula}
        </div>
        ${f.exemploCNA.tabela}
        <div class="resultado-box">
          <span style="font-size:18px;">✅</span>
          <span><strong>Resultado:</strong> ${f.exemploCNA.resultado}</span>
        </div>
      </div>
    </div>

    <!-- Erros comuns -->
    <div class="bloco">
      <div class="bloco-titulo">⚠️ Erros Comuns</div>
      ${f.erros.map(e => `
        <div class="erro-item">
          <span class="erro-code">${e.code}</span>
          <span class="erro-desc">${e.desc}</span>
        </div>`).join('')}
    </div>

    <!-- Dica -->
    <div class="bloco">
      <div class="bloco-titulo">🌟 Dica do Joel</div>
      <div class="dica-box">
        <div class="dica-icon">💡</div>
        <div class="dica-text">${f.dica}</div>
      </div>
    </div>

    <!-- Navegacao entre formulas -->
    <div style="display:flex;justify-content:space-between;
      gap:12px;margin-top:8px;flex-wrap:wrap;">
      ${getPrev(current) ? `
        <a href="formula.html?s=${getPrev(current)}"
          class="btn btn-sec"
          style="text-decoration:none;">
          ← ${FORMULAS[getPrev(current)].nome}
        </a>` : '<div></div>'}
      ${getNext(current) ? `
        <a href="formula.html?s=${getNext(current)}"
          class="btn btn-grad"
          style="text-decoration:none;">
          ${FORMULAS[getNext(current)].nome} →
        </a>` : '<div></div>'}
    </div>`;
}

// Switch de abas
window.switchTab = (tab, btn) => {
  document.querySelectorAll('.ex-tab-btn')
    .forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.ex-content')
    .forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('ex-' + tab).classList.add('active');
};

// Prev/Next
const keys = Object.keys(FORMULAS);
function getPrev(k){ const i=keys.indexOf(k); return i>0?keys[i-1]:null; }
function getNext(k){ const i=keys.indexOf(k); return i<keys.length-1?keys[i+1]:null; }

// Init
const f = FORMULAS[current];
if (f) {
  renderHero(f);
  renderNav();
  renderContent(f);
} else {
  window.location.href = 'formula.html?s=S1';
}
</script>
</body>
</html>
